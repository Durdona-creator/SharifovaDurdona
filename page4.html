<!DOCTYPE html>
<html lang="en" id="top">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitZone Gym | Join</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="top-header">
    <div class="logo">
      <span class="fit">Fit</span><span class="zone">Zone</span>
    </div>

    <nav aria-label="Main navigation">
  <a href="index.html">Home</a>
  <a href="page2.html">Membership</a>
  <a href="page3.html">Community</a>
  <a href="page4.html">Join</a>
  <a href="page5.html">My Fit</a>
    </nav>
  </header>

  <main>
    <section class="form-section">
      <h1>Join FitZone</h1>
      <p>Fill in the form to start your fitness journey.</p>

      <form id="joinForm">

        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="age">Age</label>
        <input type="number" id="age" name="age" placeholder="Enter your age" min="10" max="100" required>

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="010-1234-5678" required>

        <fieldset>
          <legend>Gender</legend>
          <div class="radio-group">
            <label for="female">
              <input type="radio" id="female" name="gender" value="Female" required> Female
            </label>
            <label for="male">
              <input type="radio" id="male" name="gender" value="Male"> Male
            </label>
          </div>
        </fieldset>

        <fieldset>
          <legend>Fitness Interests</legend>
          <div class="checkbox-group">
            <label for="weightLoss">
              <input type="checkbox" id="weightLoss" name="interests" value="Weight Loss"> Weight Loss
            </label>
            <label for="muscleGain">
              <input type="checkbox" id="muscleGain" name="interests" value="Muscle Gain"> Muscle Gain
            </label>
            <label for="generalFitness">
              <input type="checkbox" id="generalFitness" name="interests" value="General Fitness"> General Fitness
            </label>
          </div>
        </fieldset>

        <label for="plan">Membership Plan</label>
        <select id="plan" name="plan" required>
          <option value="">Choose a plan</option>
          <option value="1 Month">1 Month</option>
          <option value="3 Months">3 Months</option>
          <option value="10 Months (Women Special)">10 Months (Women Special)</option>
        </select>

        <label for="visitTime">Preferred Visit Time</label>
        <select id="visitTime" name="visitTime" required>
          <option value="">Choose visit time</option>
          <option value="Morning">Morning</option>
          <option value="Afternoon">Afternoon</option>
          <option value="Evening">Evening</option>
        </select>

        <label for="message">Fitness Goal / Additional Message</label>
        <textarea id="message" name="message" placeholder="Write your goal here..." required></textarea>

        <div class="button-row">
          <button type="submit" class="btn-blue">Submit</button>
          <button type="reset" class="btn-white">Reset</button>
        </div>

      </form>
    </section>
  </main>

  <footer>
    <p><strong>FitZone Gym</strong> © 2026 All Rights Reserved.</p>
    <p>Email: fitzone@gym.com | Open 24/7 | Contact: 010-5629-3105</p>
    <p><a href="#top" class="back-top">Back to Top</a></p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
